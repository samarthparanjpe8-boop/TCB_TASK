app = "classroom-api"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  builder = "heroku/buildpacks:20"

[env]
  PORT = "4000"
  NODE_ENV = "production"
  # You should set these with `fly secrets set` after deployment:
  # MONGODB_URI, SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_JWT_SECRET,
  # SMTP_USER, SMTP_PASS, FRONTEND_URL, BACKEND_URL

[[services]]
  internal_port = 4000
  protocol = "tcp"

  [services.concurrency]
    type = "connections"
    soft_limit = 20
    hard_limit = 25

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.tcp_checks]
    interval = 10000
    timeout = 2000
    grace_period = "10s"
    restart_limit = 0
